name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) whenever a version tag is
# pushed (e.g. v0.1.0). No API token is stored in the repo -- PyPI verifies
# the GitHub OIDC identity configured as a "trusted publisher" for the project.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
